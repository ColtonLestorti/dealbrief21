name: Update Market Snapshot

# PAUSED (2026-07-07): scheduled runs disabled to stop API spend while the
# Anthropic API key is at its limit. Re-enable by uncommenting the schedule
# block below (already reduced from 3x/day to 1x/day after close, 21:15 UTC).
# Still runnable on demand from the Actions tab.
on:
  # schedule:
  #   - cron: '15 21 * * 1-5'
  workflow_dispatch:          # Manual "Run workflow" button

permissions:
  contents: write

jobs:
  update-market:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate market.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.CLAUDEAPI }}
        run: node scripts/generate-market.js

      - name: Commit and push if changed
        run: |
          git config user.name  "DealBrief Bot"
          git config user.email "actions@github.com"
          git add data/market.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Market snapshot: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
